apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-update-pods
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-update-pods
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-update-pods
subjects:
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
