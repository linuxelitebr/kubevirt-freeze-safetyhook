# ============================================================================
# Safety-Net Hook Manager - All-in-One
#
# Usage: oc apply -f safetyhook-all-in-one.yaml
#
# Contains:
#   - Namespace: safetyhook-monitor
#   - ServiceAccounts + RBAC + SCC
#   - ConfigMap: freeze-state (state between monitor executions)
#   - CronJob: safetyhook-db (every 5 min) - applies safety-net annotations
#   - CronJob: safetyhook-monitor (every 1 min) - monitors freeze state
# ============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: safetyhook-monitor
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
    openshift.io/cluster-monitoring: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero-hook-manager
  namespace: openshift-cnv
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: safetyhook-monitor
  namespace: safetyhook-monitor
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero-hook-manager
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "patch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: safetyhook-monitor
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["kubevirt.io"]
  resources: ["virtualmachineinstances"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
  resourceNames: ["freeze-state"]
---
# Extra rule to allow creating the configmap if it does not exist
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: safetyhook-monitor-cm
  namespace: safetyhook-monitor
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: safetyhook-monitor-cm
  namespace: safetyhook-monitor
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: safetyhook-monitor-cm
subjects:
- kind: ServiceAccount
  name: safetyhook-monitor
  namespace: safetyhook-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-hook-manager
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velero-hook-manager
subjects:
- kind: ServiceAccount
  name: velero-hook-manager
  namespace: openshift-cnv
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: safetyhook-monitor
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: safetyhook-monitor
subjects:
- kind: ServiceAccount
  name: safetyhook-monitor
  namespace: safetyhook-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-hook-manager-scc-privileged
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
- kind: ServiceAccount
  name: velero-hook-manager
  namespace: openshift-cnv
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: freeze-state
  namespace: safetyhook-monitor
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
data:
  frozen-vms: ""
---
# ============================================================================
# CronJob 1: Safety-net hook applicator (every 5 minutes)
# Namespace: openshift-cnv
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: safetyhook-db
  namespace: openshift-cnv
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 270
      template:
        spec:
          serviceAccountName: velero-hook-manager
          restartPolicy: Never
          terminationGracePeriodSeconds: 20
          containers:
          - name: safetyhook
            image: registry.redhat.io/openshift4/ose-cli:latest
            imagePullPolicy: IfNotPresent
            env:
            - name: UNFREEZE_TIMEOUT
              value: "120"
            - name: FREEZE_TIMEOUT
              value: "45"
            - name: NS_LABEL_SELECTOR
              value: ""
            command:
            - /bin/sh
            - -c
            - |
              echo "=== Safety-net hook manager ==="
              echo "Started: $(date -u)"
              echo ""

              if [ -n "${NS_LABEL_SELECTOR}" ]; then
                echo "Mode: label selector (${NS_LABEL_SELECTOR})"
                NAMESPACES=$(oc get namespaces -l "${NS_LABEL_SELECTOR}" \
                  --no-headers -o custom-columns=NS:.metadata.name 2>/dev/null)
              else
                echo "Mode: auto-discovery (all namespaces with VMs)"
                NAMESPACES=$(oc get pods --all-namespaces -l kubevirt.io=virt-launcher \
                  --no-headers -o custom-columns=NS:.metadata.namespace 2>/dev/null | sort -u)
              fi

              if [ -z "${NAMESPACES}" ]; then
                echo "No namespaces found."
                exit 0
              fi

              echo "Discovered namespaces: $(echo ${NAMESPACES} | tr '\n' ' ')"
              echo ""

              for NS in ${NAMESPACES}; do
                EXCLUDE=$(oc get namespace ${NS} \
                  -o jsonpath='{.metadata.labels.backup-safetyhook-exclude}' 2>/dev/null)
                if [ "${EXCLUDE}" = "true" ]; then
                  echo "=== Skipping namespace: ${NS} (excluded) ==="
                  echo ""
                  continue
                fi

                echo "=== Processing namespace: ${NS} ==="
                PODS=$(oc get pods -n ${NS} -l kubevirt.io=virt-launcher \
                  --field-selector=status.phase=Running \
                  -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)

                for POD in ${PODS}; do
                  CURRENT_HOOK=$(oc get pod ${POD} -n ${NS} \
                    -o jsonpath='{.metadata.annotations.pre\.hook\.backup\.velero\.io/command}' 2>/dev/null)

                  if echo "${CURRENT_HOOK}" | grep -q "unfreezeTimeoutSeconds"; then
                    echo "  Already protected: ${POD}"
                    continue
                  fi

                  if [ -z "${CURRENT_HOOK}" ]; then
                    echo "  No hook found: ${POD}"
                    continue
                  fi

                  VM_NAME=$(oc get pod ${POD} -n ${NS} \
                    -o jsonpath='{.metadata.labels.vm\.kubevirt\.io/name}' 2>/dev/null)

                  if [ -z "${VM_NAME}" ]; then
                    echo "  ERROR: could not extract VM name from: ${POD}"
                    continue
                  fi

                  echo "  Applying safety-net: ${POD} (VM: ${VM_NAME})"

                  PRE_CMD="[\"\/bin\/sh\", \"-c\", \"timeout ${FREEZE_TIMEOUT} \/usr\/bin\/virt-freezer --freeze --name ${VM_NAME} --namespace ${NS} --unfreezeTimeoutSeconds ${UNFREEZE_TIMEOUT} || (echo SAFETYHOOK-EMERGENCY: freeze failed or timed out, forcing unfreeze for VM ${VM_NAME} in ${NS}; \/usr\/bin\/virt-freezer --unfreeze --name ${VM_NAME} --namespace ${NS} 2>\/dev\/null); exit 0\"]"

                  POST_CMD="[\"\/bin\/sh\", \"-c\", \"echo SAFETYHOOK: post-hook unfreeze for VM ${VM_NAME} in ${NS}; \/usr\/bin\/virt-freezer --unfreeze --name ${VM_NAME} --namespace ${NS} 2>\/dev\/null; exit 0\"]"

                  oc annotate pod ${POD} -n ${NS} --overwrite \
                    "pre.hook.backup.velero.io/command=${PRE_CMD}" \
                    "pre.hook.backup.velero.io/container=compute" \
                    "pre.hook.backup.velero.io/timeout=180s" \
                    "pre.hook.backup.velero.io/on-error=Continue" \
                    "post.hook.backup.velero.io/command=${POST_CMD}" \
                    "post.hook.backup.velero.io/container=compute" \
                    "post.hook.backup.velero.io/timeout=60s" \
                    "post.hook.backup.velero.io/on-error=Continue"

                  if [ $? -eq 0 ]; then
                    echo "  OK: ${POD}"
                  else
                    echo "  ERROR annotating: ${POD}"
                  fi
                done
                echo ""
              done
              echo "=== Completed: $(date -u) ==="
---
# ============================================================================
# CronJob 2: Freeze state monitor (every 1 minute)
# Namespace: safetyhook-monitor (logs go to Loki tenant application)
#
# Only logs on state transitions:
#   SAFETYHOOK-MONITOR: FROZEN    - VM just entered frozen state
#   SAFETYHOOK-MONITOR: RECOVERED - VM just returned to normal (auto-unfreeze worked)
#
# Zero logs when all VMs are healthy.
#
# Loki queries:
#   { log_type="application" } |= "SAFETYHOOK-MONITOR: FROZEN"
#   { log_type="application" } |= "SAFETYHOOK-MONITOR: RECOVERED"
#   { log_type="application" } |= "SAFETYHOOK-MONITOR"
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: safetyhook-monitor
  namespace: safetyhook-monitor
  labels:
    app.kubernetes.io/component: kubevirt-freeze-safetyhook
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 90
      template:
        spec:
          serviceAccountName: safetyhook-monitor
          restartPolicy: Never
          terminationGracePeriodSeconds: 15
          containers:
          - name: monitor
            image: registry.redhat.io/openshift4/ose-cli:latest
            imagePullPolicy: IfNotPresent
            env:
            - name: NS_LABEL_SELECTOR
              value: ""
            command:
            - /bin/sh
            - -c
            - |
              CM_NS="safetyhook-monitor"
              CM_NAME="freeze-state"
              NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

              # Read previous state from ConfigMap
              PREV_FROZEN=$(oc get configmap ${CM_NAME} -n ${CM_NS} \
                -o jsonpath='{.data.frozen-vms}' 2>/dev/null || echo "")

              # Discover namespaces
              if [ -n "${NS_LABEL_SELECTOR}" ]; then
                NAMESPACES=$(oc get namespaces -l "${NS_LABEL_SELECTOR}" \
                  --no-headers -o custom-columns=NS:.metadata.name 2>/dev/null)
              else
                NAMESPACES=$(oc get pods --all-namespaces -l kubevirt.io=virt-launcher \
                  --field-selector=status.phase=Running \
                  --no-headers -o custom-columns=NS:.metadata.namespace 2>/dev/null | sort -u)
              fi

              CURRENT_FROZEN=""

              for NS in ${NAMESPACES}; do
                EXCLUDE=$(oc get namespace ${NS} \
                  -o jsonpath='{.metadata.labels.backup-safetyhook-exclude}' 2>/dev/null)
                [ "${EXCLUDE}" = "true" ] && continue

                for VM in $(oc get vmi -n ${NS} --no-headers -o custom-columns=NAME:.metadata.name 2>/dev/null); do
                  STATUS=$(oc get vmi ${VM} -n ${NS} -o jsonpath='{.status.fsFreezeStatus}' 2>/dev/null)

                  if [ "${STATUS}" = "frozen" ]; then
                    KEY="${NS}/${VM}"

                    # Add to current frozen list
                    if [ -z "${CURRENT_FROZEN}" ]; then
                      CURRENT_FROZEN="${KEY}"
                    else
                      CURRENT_FROZEN="${CURRENT_FROZEN},${KEY}"
                    fi

                    # Check if this is a new freeze (not in previous state)
                    if ! echo ",${PREV_FROZEN}," | grep -q ",${KEY},"; then
                      echo "SAFETYHOOK-MONITOR: FROZEN vm=${VM} namespace=${NS} timestamp=${NOW}"
                    fi
                  fi
                done
              done

              # Check for recovered VMs (were frozen, now unfrozen)
              if [ -n "${PREV_FROZEN}" ]; then
                OLD_IFS="${IFS}"
                IFS=","
                for KEY in ${PREV_FROZEN}; do
                  if ! echo ",${CURRENT_FROZEN}," | grep -q ",${KEY},"; then
                    REC_NS=$(echo "${KEY}" | cut -d'/' -f1)
                    REC_VM=$(echo "${KEY}" | cut -d'/' -f2)
                    echo "SAFETYHOOK-MONITOR: RECOVERED vm=${REC_VM} namespace=${REC_NS} timestamp=${NOW}"
                  fi
                done
                IFS="${OLD_IFS}"
              fi

              # Update ConfigMap with current state
              oc patch configmap ${CM_NAME} -n ${CM_NS} --type merge \
                -p "{\"data\":{\"frozen-vms\":\"${CURRENT_FROZEN}\"}}" 2>/dev/null